<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img" aria-label="Soph — Building systems where humans learn and AI executes">
  <title>Soph — Building systems where humans learn and AI executes.</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#D97757"/>
      <stop offset="1" stop-color="#E0A458"/>
    </linearGradient>
  </defs>

  <!-- panel -->
  <rect x="0" y="0" width="1200" height="300" rx="18" fill="url(#bg)"/>
  <rect x="0" y="0" width="6" height="300" rx="3" fill="url(#accent)"/>

  <!-- left: wordmark + tagline -->
  <g font-family="'Segoe UI', Helvetica, Arial, sans-serif">
    <text x="64" y="118" font-size="76" font-weight="800" fill="#f0f6fc" letter-spacing="-1">Soph</text>
    <rect x="66" y="138" width="96" height="6" rx="3" fill="url(#accent)"/>
    <text x="66" y="190" font-size="25" font-weight="500" fill="#adbac7">Building systems where humans</text>
    <text x="66" y="223" font-size="25" font-weight="500" fill="#adbac7">learn and AI executes.</text>
    <text x="66" y="266" font-size="15" font-weight="600" fill="#D97757" letter-spacing="2">PROMIX · MNEMOS · HOLIPET · VANTX</text>
  </g>

  <!-- right: terminal card -->
  <g>
    <rect x="664" y="52" width="476" height="196" rx="12" fill="#0b0f14" stroke="#30363d" stroke-width="1"/>
    <circle cx="688" cy="78" r="5" fill="#ff5f56"/>
    <circle cx="706" cy="78" r="5" fill="#ffbd2e"/>
    <circle cx="724" cy="78" r="5" fill="#27c93f"/>
    <line x1="664" y1="98" x2="1140" y2="98" stroke="#21262d" stroke-width="1"/>
    <g font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="17">
      <text x="688" y="136"><tspan fill="#27c93f">~ </tspan><tspan fill="#8b949e">humans consume information</tspan></text>
      <text x="688" y="170"><tspan fill="#27c93f">~ </tspan><tspan fill="#8b949e">agents execute information</tspan></text>
      <text x="688" y="204"><tspan fill="#D97757">~ </tspan><tspan fill="#c9d1d9">i build the infrastructure</tspan></text>
      <text x="688" y="228"><tspan fill="#c9d1d9">  that converts one into the other</tspan><tspan fill="#27c93f">▋</tspan></text>
    </g>
  </g>
</svg>
