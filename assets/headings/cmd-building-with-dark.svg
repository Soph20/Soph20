<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 40" width="600" height="40" role="img" aria-label="/building-with — Languages, models, and infrastructure I build with.">
  <!-- input box -->
  <rect x="1" y="4" width="598" height="32" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1.5"/>
  <!-- prompt -->
  <text x="16" y="25" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="15" font-weight="700" fill="#6CB6FF">❯</text>
  <!-- typed command -->
  <text x="34" y="25" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="15" font-weight="600" fill="#E6EDF3">/building-with</text>
  <!-- blinking cursor -->
  <rect x="160" y="14" width="8" height="14" fill="#6CB6FF">
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>
  <!-- description hint (right-aligned) -->
  <text x="584" y="25" text-anchor="end" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12.5" fill="#8B949E">Languages, models, and infrastructure I build with.</text>
</svg>
